server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    root /var/www/canvas/public;
    index index.php;

    # Clean canvas URLs: /c/{id} → canvas.php?id={id}
    location ~ ^/c/([a-zA-Z0-9_-]+)$ {
        rewrite ^ /canvas.php?id=$1 last;
    }

    # Docs page
    location = /docs {
        rewrite ^ /docs.php last;
    }

    # AI pipeline generator
    location = /generate {
        rewrite ^ /generate.php last;
    }

    # API endpoints
    location /api/ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
    }

    # Pipeline (AI generation — longer timeout)
    location /pipeline/ {
        alias /var/www/canvas/pipeline/;
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/canvas/pipeline/$fastcgi_script_name;
        fastcgi_read_timeout 180;
    }

    # WebSocket proxy → Ratchet on port 8080
    location = /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # SSE events — disable buffering for real-time streaming
    location = /api/events.php {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 3600;
        # Disable nginx buffering for SSE
        proxy_buffering off;
        fastcgi_keep_conn on;
        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
    }

    # PHP files
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
    }

    # Static assets — 1 year cache, immutable
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block direct access to data, config, ws, db directories
    location ~ ^/(data|config|ws|db|supervisor|nginx|sdk)/ {
        deny all;
        return 403;
    }

    # Block .env and .git
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 403;
    }

    # Default PHP handler
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Logging
    access_log /var/log/nginx/canvas.access.log;
    error_log  /var/log/nginx/canvas.error.log;
}

